<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Fabrice-E-Shopping</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div style="min-height: 100vh; display: flex; flex-direction: column; background: rgba(243, 244, 246, 0.3);">
        <div id="portalHeader"></div>

        <div style="display: flex; flex: 1;">
            <aside class="sidebar">
                <h2 style="padding: 1.5rem; font-size: 1.25rem; font-weight: 700; color: white; border-bottom: 1px solid rgba(255, 255, 255, 0.1);">Customer Portal</h2>
                <nav>
                    <a href="customer-dashboard.html" class="sidebar-link">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="7" height="7"></rect>
                            <rect x="14" y="3" width="7" height="7"></rect>
                            <rect x="14" y="14" width="7" height="7"></rect>
                            <rect x="3" y="14" width="7" height="7"></rect>
                        </svg>
                        <span>Dashboard</span>
                    </a>
                    <a href="customer-products.html" class="sidebar-link">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="9" cy="21" r="1"></circle>
                            <circle cx="20" cy="21" r="1"></circle>
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                        </svg>
                        <span>Browse Products</span>
                    </a>
                    <a href="customer-orders.html" class="sidebar-link">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                        <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                        <line x1="12" y1="22.08" x2="12" y2="12"></line>
                    </svg>
                    <span>My Orders</span>
                    </a>
                    <a href="customer-reviews.html" class="sidebar-link">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                        </svg>
                        <span>My Reviews</span>
                    </a>
                    <a href="customer-profile.html" class="sidebar-link">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <span>Profile</span>
                    </a>
                    <a href="customer-settings.html" class="sidebar-link">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M12 1v6m0 6v6"></path>
                            <path d="M17 7l-5 5"></path>
                            <path d="M7 7l5 5"></path>
                        </svg>
                        <span>Settings</span>
                    </a>
                </nav>
                <div style="margin-top: auto; padding: 0.75rem;">
                    <button onclick="auth.logout()" class="btn btn-outline btn-full" style="color: #ef4444; border-color: #ef4444;">Logout</button>
                </div>
            </aside>

            <main class="dashboard-content">
                <h1 style="font-size: 1.875rem; font-weight: 700; margin-bottom: 1.5rem;">Checkout</h1>

                <div style="background: var(--card); border: 1px solid var(--border); border-radius: 1rem; padding: 2rem; max-width: 600px;">
                    <h2 style="font-size: 1.25rem; font-weight: 700; margin-bottom: 1.5rem;">Order Summary</h2>
                    <div id="orderSummary"></div>

                    <form id="checkoutForm" style="margin-top: 2rem;">
                        <h3 style="font-size: 1.125rem; font-weight: 600; margin-bottom: 1rem;">Shipping Information</h3>
                        
                        <div class="form-group">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-input" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Address</label>
                            <textarea class="form-textarea" rows="3" required></textarea>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Phone Number</label>
                            <input type="tel" class="form-input" required>
                        </div>

                        <h3 style="font-size: 1.125rem; font-weight: 600; margin: 1.5rem 0 1rem;">Payment Method</h3>
                        
                        <div class="form-group">
                            <select class="form-select" required>
                                <option value="">Select Payment Method</option>
                                <option value="card">Credit/Debit Card</option>
                                <option value="mobile">Mobile Money</option>
                                <option value="cash">Cash on Delivery</option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-primary btn-full" style="margin-top: 1.5rem;">Place Order</button>
                    </form>
                </div>
            </main>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/data.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/portal-header.js"></script>
    <script>
        auth.requireRole('customer');
        
        // Render header
        document.getElementById('portalHeader').innerHTML = renderPortalHeader('Customer Portal', true);

        // Get product ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const productId = parseInt(urlParams.get('id'));
        const product = products.find(p => p.id === productId);

        if (product) {
            const shipping = 5.00;
            const tax = product.price * 0.1;
            const total = product.price + shipping + tax;

            document.getElementById('orderSummary').innerHTML = `
                <div style="display: flex; gap: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border);">
                    <img src="${product.image}" alt="${product.name}" style="width: 80px; height: 80px; object-fit: cover; border-radius: 0.5rem;">
                    <div style="flex: 1;">
                        <h4 style="font-weight: 600;">${product.name}</h4>
                        <p style="color: var(--text-muted); font-size: 0.875rem;">${product.category}</p>
                        <p style="font-weight: 700; color: var(--accent); margin-top: 0.5rem;">$${product.price}</p>
                    </div>
                </div>

                <div style="margin-top: 1rem; display: flex; flex-direction: column; gap: 0.5rem;">
                    <div style="display: flex; justify-between; font-size: 0.875rem;">
                        <span style="color: var(--text-muted);">Subtotal</span>
                        <span style="font-weight: 500;">$${product.price.toFixed(2)}</span>
                    </div>
                    <div style="display: flex; justify-between; font-size: 0.875rem;">
                        <span style="color: var(--text-muted);">Shipping</span>
                        <span style="font-weight: 500;">$${shipping.toFixed(2)}</span>
                    </div>
                    <div style="display: flex; justify-between; font-size: 0.875rem;">
                        <span style="color: var(--text-muted);">Tax</span>
                        <span style="font-weight: 500;">$${tax.toFixed(2)}</span>
                    </div>
                    <div style="border-top: 1px solid var(--border); padding-top: 0.75rem; margin-top: 0.5rem; display: flex; justify-between;">
                        <span style="font-weight: 700;">Total</span>
                        <span style="font-weight: 700; font-size: 1.25rem; color: var(--accent);">$${total.toFixed(2)}</span>
                    </div>
                </div>
            `;
        }

        document.getElementById('checkoutForm').addEventListener('submit', (e) => {
            e.preventDefault();
            showToast('Order placed successfully!', 'success');
            setTimeout(() => {
                window.location.href = 'customer-orders.html';
            }, 1500);
        });
    </script>
</body>
</html>
