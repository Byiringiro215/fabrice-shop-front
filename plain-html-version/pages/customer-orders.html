<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - Customer Portal</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div id="portalHeader"></div>
    
    <div class="dashboard">
        <aside class="sidebar">
            <h2 style="padding: 1.5rem; font-size: 1.25rem; font-weight: 700; color: white; border-bottom: 1px solid rgba(255, 255, 255, 0.1);">Customer Portal</h2>
            <nav>
                <a href="customer-dashboard.html" class="sidebar-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    <span>Dashboard</span>
                </a>
                <a href="customer-products.html" class="sidebar-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span>Browse Products</span>
                </a>
                <a href="customer-orders.html" class="sidebar-link active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                        <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                        <line x1="12" y1="22.08" x2="12" y2="12"></line>
                    </svg>
                    <span>My Orders</span>
                </a>
                <a href="customer-reviews.html" class="sidebar-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                    </svg>
                    <span>My Reviews</span>
                </a>
                <a href="customer-profile.html" class="sidebar-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    <span>Profile</span>
                </a>
                <a href="customer-settings.html" class="sidebar-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M12 1v6m0 6v6"></path>
                        <path d="M17 7l-5 5"></path>
                        <path d="M7 7l5 5"></path>
                    </svg>
                    <span>Settings</span>
                </a>
            </nav>
            <div style="margin-top: auto; padding: 0.75rem;">
                <button onclick="auth.logout()" class="btn btn-outline btn-full" style="color: #ef4444; border-color: #ef4444;">Logout</button>
            </div>
        </aside>

        <main class="dashboard-content">
            <h1 style="font-size: 2rem; font-weight: 700; margin-bottom: 2rem;">My Orders</h1>

            <div style="background: var(--card); border: 1px solid var(--border); border-radius: 1rem; overflow: hidden;">
                <div style="overflow-x: auto;">
                    <table style="width: 100%; border-collapse: collapse;">
                        <thead style="background: rgba(243, 244, 246, 0.5);">
                            <tr>
                                <th style="padding: 1rem; text-align: left; font-weight: 500;">Order ID</th>
                                <th style="padding: 1rem; text-align: left; font-weight: 500;">Product</th>
                                <th style="padding: 1rem; text-align: left; font-weight: 500;">Date</th>
                                <th style="padding: 1rem; text-align: left; font-weight: 500;">Status</th>
                                <th style="padding: 1rem; text-align: left; font-weight: 500;">Price</th>
                                <th style="padding: 1rem; text-align: left; font-weight: 500;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="ordersTable"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/data.js"></script>
    <script src="../js/portal-header.js"></script>
    <script src="../js/main.js"></script>
    <script>
        auth.requireRole('customer');

        function getStatusBadge(status) {
            const colors = {
                'Delivered': 'background: #dcfce7; color: #166534;',
                'Shipped': 'background: #dbeafe; color: #1e40af;',
                'Pending': 'background: #fef3c7; color: #92400e;'
            };
            return `<span style="${colors[status]} padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.875rem; font-weight: 500;">${status}</span>`;
        }

        function renderOrders() {
            const tbody = document.getElementById('ordersTable');
            tbody.innerHTML = orders.map(order => `
                <tr style="border-top: 1px solid var(--border);">
                    <td style="padding: 1rem; font-weight: 500;">${order.id}</td>
                    <td style="padding: 1rem;">${order.product}</td>
                    <td style="padding: 1rem; color: var(--text-muted);">${formatDate(order.date)}</td>
                    <td style="padding: 1rem;">${getStatusBadge(order.status)}</td>
                    <td style="padding: 1rem; font-weight: 600;">$${order.price}</td>
                    <td style="padding: 1rem;">
                        <button onclick="viewOrder('${order.id}')" class="btn btn-outline" style="font-size: 0.875rem; padding: 0.5rem 1rem;">View</button>
                    </td>
                </tr>
            `).join('');
        }

        function viewOrder(orderId) {
            const order = orders.find(o => o.id === orderId);
            if (!order) return;

            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="modal-header">
                        <h2 class="modal-title">Order Details</h2>
                        <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">&times;</button>
                    </div>
                    <div class="modal-body">
                        <div style="margin-bottom: 1.5rem;">
                            <p style="font-size: 0.875rem; color: var(--text-muted); margin-bottom: 0.25rem;">Order ID</p>
                            <p style="font-weight: 600;">${order.id}</p>
                        </div>
                        <div style="margin-bottom: 1.5rem;">
                            <p style="font-size: 0.875rem; color: var(--text-muted); margin-bottom: 0.25rem;">Product</p>
                            <p style="font-weight: 600;">${order.product}</p>
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem;">
                            <div>
                                <p style="font-size: 0.875rem; color: var(--text-muted); margin-bottom: 0.25rem;">Date</p>
                                <p style="font-weight: 600;">${formatDate(order.date)}</p>
                            </div>
                            <div>
                                <p style="font-size: 0.875rem; color: var(--text-muted); margin-bottom: 0.25rem;">Status</p>
                                ${getStatusBadge(order.status)}
                            </div>
                        </div>
                        <div style="margin-bottom: 1.5rem;">
                            <p style="font-size: 0.875rem; color: var(--text-muted); margin-bottom: 0.25rem;">Price</p>
                            <p style="font-size: 1.5rem; font-weight: 700; color: var(--accent);">${order.price}</p>
                        </div>
                        <div style="background: rgba(243, 244, 246, 0.5); padding: 1rem; border-radius: 0.5rem;">
                            <p style="font-size: 0.875rem; color: var(--text-muted); margin-bottom: 0.5rem;">Shipping Address</p>
                            <p>123 Main Street<br>Kigali, Rwanda</p>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button onclick="this.closest('.modal-overlay').remove()" class="btn btn-outline">Close</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            modal.addEventListener('click', (e) => {
                if (e.target === modal) modal.remove();
            });
        }

        // Initialize portal header
        document.getElementById('portalHeader').innerHTML = renderPortalHeader('Customer Portal', true);
        
        renderOrders();
    </script>
</body>
</html>
