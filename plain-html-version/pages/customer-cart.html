<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Customer Portal</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div id="portalHeader"></div>
    
    <div class="dashboard">
        <aside class="sidebar">
            <h2 style="padding: 1.5rem; font-size: 1.25rem; font-weight: 700; color: white; border-bottom: 1px solid rgba(255, 255, 255, 0.1);">Customer Portal</h2>
            <nav>
                <a href="customer-dashboard.html" class="sidebar-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    <span>Dashboard</span>
                </a>
                <a href="customer-products.html" class="sidebar-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span>Browse Products</span>
                </a>
                <a href="customer-orders.html" class="sidebar-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                        <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                        <line x1="12" y1="22.08" x2="12" y2="12"></line>
                    </svg>
                    <span>My Orders</span>
                </a>
                <a href="customer-reviews.html" class="sidebar-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                    </svg>
                    <span>My Reviews</span>
                </a>
                <a href="customer-profile.html" class="sidebar-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    <span>Profile</span>
                </a>
                <a href="customer-settings.html" class="sidebar-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M12 1v6m0 6v6"></path>
                        <path d="M17 7l-5 5"></path>
                        <path d="M7 7l5 5"></path>
                    </svg>
                    <span>Settings</span>
                </a>
            </nav>
            <div style="margin-top: auto; padding: 0.75rem;">
                <button onclick="auth.logout()" class="btn btn-outline btn-full" style="color: #ef4444; border-color: #ef4444;">Logout</button>
            </div>
        </aside>

        <main class="dashboard-content">
            <div id="cartContent"></div>
        </main>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/data.js"></script>
    <script src="../js/portal-header.js"></script>
    <script src="../js/main.js"></script>
    <script>
        auth.requireRole('customer');

        // Initialize portal header
        document.getElementById('portalHeader').innerHTML = renderPortalHeader('Customer Portal', true);

        function renderCart() {
            const cart = auth.getCart();
            const cartContent = document.getElementById('cartContent');

            if (cart.length === 0) {
                cartContent.innerHTML = `
                    <div style="text-align: center; padding: 3rem 0;">
                        <div style="font-size: 4rem; margin-bottom: 1rem;">🛒</div>
                        <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem;">Your cart is empty</h2>
                        <p style="color: var(--text-muted); margin-bottom: 1.5rem;">Add some products to get started!</p>
                        <a href="customer-products.html" class="btn btn-primary">Browse Products</a>
                    </div>
                `;
                return;
            }

            const total = auth.getCartTotal();
            const shipping = 5.00;
            const tax = total * 0.1;
            const grandTotal = total + shipping + tax;

            cartContent.innerHTML = `
                <div style="display: flex; justify-between; align-items: center; margin-bottom: 1.5rem;">
                    <h2 style="font-size: 1.5rem; font-weight: 700;">Shopping Cart</h2>
                    <button onclick="clearCart()" style="color: var(--error); background: none; border: none; cursor: pointer; text-decoration: underline; font-size: 0.875rem;">Clear Cart</button>
                </div>

                <div style="display: grid; grid-template-columns: 1fr; gap: 1.5rem;">
                    <div style="display: grid; grid-template-columns: 1fr; lg:grid-template-columns: 2fr 1fr; gap: 1.5rem;">
                        <!-- Cart Items -->
                        <div style="display: flex; flex-direction: column; gap: 1rem;">
                            ${cart.map(item => `
                                <div style="background: var(--card); border: 1px solid var(--border); border-radius: 1rem; padding: 1rem; display: flex; gap: 1rem;">
                                    <img src="${item.image}" alt="${item.name}" style="width: 96px; height: 96px; object-fit: cover; border-radius: 0.5rem;">
                                    <div style="flex: 1;">
                                        <h3 style="font-weight: 600; margin-bottom: 0.25rem;">${item.name}</h3>
                                        <p style="color: var(--accent); font-weight: 700;">$${item.price}</p>
                                        <div style="display: flex; align-items: center; gap: 0.75rem; margin-top: 0.75rem;">
                                            <div style="display: flex; align-items: center; gap: 0.5rem; border: 1px solid var(--border); border-radius: 0.5rem;">
                                                <button onclick="updateQuantity(${item.id}, ${item.quantity - 1})" style="padding: 0.5rem; background: none; border: none; cursor: pointer;">−</button>
                                                <span style="padding: 0 0.75rem; font-weight: 500;">${item.quantity}</span>
                                                <button onclick="updateQuantity(${item.id}, ${item.quantity + 1})" style="padding: 0.5rem; background: none; border: none; cursor: pointer;">+</button>
                                            </div>
                                            <button onclick="removeItem(${item.id})" style="padding: 0.5rem; background: none; border: none; cursor: pointer; color: var(--error);">🗑️</button>
                                        </div>
                                    </div>
                                    <div style="text-align: right;">
                                        <p style="font-weight: 700; font-size: 1.125rem;">$${(item.price * item.quantity).toFixed(2)}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>

                        <!-- Order Summary -->
                        <div>
                            <div style="background: var(--card); border: 1px solid var(--border); border-radius: 1rem; padding: 1.5rem; position: sticky; top: 6rem;">
                                <h3 style="font-size: 1.25rem; font-weight: 700; margin-bottom: 1rem;">Order Summary</h3>
                                <div style="display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 1rem;">
                                    <div style="display: flex; justify-between; font-size: 0.875rem;">
                                        <span style="color: var(--text-muted);">Subtotal</span>
                                        <span style="font-weight: 500;">$${total.toFixed(2)}</span>
                                    </div>
                                    <div style="display: flex; justify-between; font-size: 0.875rem;">
                                        <span style="color: var(--text-muted);">Shipping</span>
                                        <span style="font-weight: 500;">$${shipping.toFixed(2)}</span>
                                    </div>
                                    <div style="display: flex; justify-between; font-size: 0.875rem;">
                                        <span style="color: var(--text-muted);">Tax</span>
                                        <span style="font-weight: 500;">$${tax.toFixed(2)}</span>
                                    </div>
                                    <div style="border-top: 1px solid var(--border); padding-top: 0.75rem; display: flex; justify-between;">
                                        <span style="font-weight: 700;">Total</span>
                                        <span style="font-weight: 700; font-size: 1.25rem; color: var(--accent);">$${grandTotal.toFixed(2)}</span>
                                    </div>
                                </div>
                                <button class="btn btn-primary btn-full" style="margin-bottom: 0.75rem;">Proceed to Checkout</button>
                                <a href="customer-products.html" class="btn btn-outline btn-full" style="text-align: center; display: block;">Continue Shopping</a>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function updateQuantity(productId, newQuantity) {
            auth.updateCartQuantity(productId, newQuantity);
            renderCart();
            showToast('Cart updated', 'success');
        }

        function removeItem(productId) {
            auth.removeFromCart(productId);
            renderCart();
            showToast('Item removed from cart', 'success');
        }

        function clearCart() {
            if (confirm('Are you sure you want to clear your cart?')) {
                auth.clearCart();
                renderCart();
                showToast('Cart cleared', 'success');
            }
        }

        renderCart();
    </script>
</body>
</html>
