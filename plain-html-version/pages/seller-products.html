<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Products - Seller Panel</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div id="portalHeader"></div>
    
    <div class="dashboard">
        <aside class="sidebar">
            <h2 style="padding: 1.5rem; font-size: 1.25rem; font-weight: 700; color: white; border-bottom: 1px solid rgba(255, 255, 255, 0.1);">Seller Panel</h2>
            <nav>
                <a href="seller-dashboard.html" class="sidebar-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    <span>Dashboard</span>
                </a>
                <a href="seller-products.html" class="sidebar-link active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                        <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                        <line x1="12" y1="22.08" x2="12" y2="12"></line>
                    </svg>
                    <span>My Products</span>
                </a>
                <a href="seller-add-product.html" class="sidebar-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    <span>Add Product</span>
                </a>
                <a href="seller-profile.html" class="sidebar-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    <span>Profile</span>
                </a>
                <a href="seller-settings.html" class="sidebar-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M12 1v6m0 6v6"></path>
                        <path d="M17 7l-5 5"></path>
                        <path d="M7 7l5 5"></path>
                    </svg>
                    <span>Settings</span>
                </a>
            </nav>
            <div style="margin-top: auto; padding: 0.75rem;">
                <button onclick="auth.logout()" class="btn btn-outline btn-full" style="color: #ef4444; border-color: #ef4444;">Logout</button>
            </div>
        </aside>

        <main class="dashboard-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h1 style="font-size: 2rem; font-weight: 700;">My Products</h1>
                <a href="seller-add-product.html" class="btn btn-primary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: inline-block; vertical-align: middle; margin-right: 0.5rem;">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Add Product
                </a>
            </div>

            <div id="productsGrid" class="products-grid"></div>
        </main>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/data.js"></script>
    <script src="../js/portal-header.js"></script>
    <script src="../js/main.js"></script>
    <script>
        auth.requireRole('seller');

        // Initialize portal header
        document.getElementById('portalHeader').innerHTML = renderPortalHeader('Seller Panel', false);

        // Show only first 6 products (simulating seller's products)
        const sellerProducts = products.slice(0, 6);

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = sellerProducts.map(product => `
                <div class="product-card">
                    <img src="${product.image}" alt="${product.name}" class="product-image">
                    <div class="product-info">
                        <div class="product-category">${product.category}</div>
                        <h3 class="product-name">${product.name}</h3>
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 0.5rem;">
                            <div class="product-price">${product.price}</div>
                            <span style="font-size: 0.75rem; color: var(--text-muted);">${product.reviews} sales</span>
                        </div>
                    </div>
                    <div class="product-actions">
                        <button onclick="editProduct(${product.id})" class="btn btn-outline" style="flex: 1; font-size: 0.875rem;">Edit</button>
                        <button onclick="deleteProduct(${product.id})" class="btn btn-outline" style="flex: 1; font-size: 0.875rem; color: #ef4444; border-color: #ef4444;">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function editProduct(id) {
            showToast('Edit functionality coming soon', 'success');
        }

        function deleteProduct(id) {
            if (confirm('Are you sure you want to delete this product?')) {
                showToast('Product deleted successfully', 'success');
            }
        }

        renderProducts();
    </script>
</body>
</html>
