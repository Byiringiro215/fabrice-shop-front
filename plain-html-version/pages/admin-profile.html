<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Admin Panel</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div id="portalHeader"></div>
    
    <div class="dashboard">
        <aside class="sidebar">
            <h2 style="padding: 1.5rem; font-size: 1.25rem; font-weight: 700; color: white; border-bottom: 1px solid rgba(255, 255, 255, 0.1);">Admin Panel</h2>
            <nav>
                <a href="admin-dashboard.html" class="sidebar-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    <span>Dashboard</span>
                </a>
                <a href="admin-users.html" class="sidebar-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                    <span>Manage Users</span>
                </a>
                <a href="admin-profile.html" class="sidebar-link active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    <span>Profile</span>
                </a>
                <a href="admin-settings.html" class="sidebar-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M12 1v6m0 6v6"></path>
                        <path d="M17 7l-5 5"></path>
                        <path d="M7 7l5 5"></path>
                    </svg>
                    <span>Settings</span>
                </a>
            </nav>
            <div style="margin-top: auto; padding: 0.75rem;">
                <button onclick="auth.logout()" class="btn btn-outline btn-full" style="color: #ef4444; border-color: #ef4444;">Logout</button>
            </div>
        </aside>

        <main class="dashboard-content">
            <h1 style="font-size: 2rem; font-weight: 700; margin-bottom: 2rem;">Admin Profile</h1>

            <div style="background: var(--card); border: 1px solid var(--border); border-radius: 1rem; padding: 2rem;">
                <div style="display: flex; align-items: center; gap: 2rem; margin-bottom: 2rem;">
                    <div id="profileAvatar" style="width: 96px; height: 96px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; color: white; font-size: 2.5rem; font-weight: 700;"></div>
                    <div>
                        <h2 id="profileName" style="font-size: 1.5rem; font-weight: 700; margin-bottom: 0.25rem;"></h2>
                        <p id="profileEmail" style="color: var(--text-muted);"></p>
                        <p style="font-size: 0.875rem; color: var(--text-muted); text-transform: capitalize;" id="profileRole"></p>
                    </div>
                </div>

                <form id="profileForm" style="max-width: 600px;">
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-input" id="name" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-input" id="email" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Phone</label>
                        <input type="tel" class="form-input" id="phone">
                    </div>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </form>
            </div>
        </main>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/portal-header.js"></script>
    <script src="../js/main.js"></script>
    <script>
        auth.requireRole('admin');
        const user = auth.getUser();

        // Initialize portal header
        document.getElementById('portalHeader').innerHTML = renderPortalHeader('Admin Panel', false);

        // Populate profile
        document.getElementById('profileAvatar').textContent = user.name.charAt(0).toUpperCase();
        document.getElementById('profileName').textContent = user.name;
        document.getElementById('profileEmail').textContent = user.email;
        document.getElementById('profileRole').textContent = user.role;
        document.getElementById('name').value = user.name;
        document.getElementById('email').value = user.email;

        document.getElementById('profileForm').addEventListener('submit', (e) => {
            e.preventDefault();
            showToast('Profile updated successfully!', 'success');
        });
    </script>
</body>
</html>
