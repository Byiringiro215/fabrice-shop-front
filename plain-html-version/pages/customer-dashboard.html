<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Dashboard - Fabrice-E-Shopping</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div style="min-height: 100vh; display: flex; flex-direction: column; background: rgba(243, 244, 246, 0.3);">
        <!-- Top Header will be inserted here -->
        <div id="portalHeader"></div>

        <div style="display: flex; flex: 1;">
            <aside class="sidebar">
                <h2 style="padding: 1.5rem; font-size: 1.25rem; font-weight: 700; color: white; border-bottom: 1px solid rgba(255, 255, 255, 0.1);">Customer Portal</h2>
                <nav>
                    <a href="customer-dashboard.html" class="sidebar-link active">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="7" height="7"></rect>
                            <rect x="14" y="3" width="7" height="7"></rect>
                            <rect x="14" y="14" width="7" height="7"></rect>
                            <rect x="3" y="14" width="7" height="7"></rect>
                        </svg>
                        <span>Dashboard</span>
                    </a>
                    <a href="customer-products.html" class="sidebar-link">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="9" cy="21" r="1"></circle>
                            <circle cx="20" cy="21" r="1"></circle>
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                        </svg>
                        <span>Browse Products</span>
                    </a>
                    <a href="customer-orders.html" class="sidebar-link">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                        <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                        <line x1="12" y1="22.08" x2="12" y2="12"></line>
                        </svg>
                        <span>My Orders</span>
                    </a>
                    <a href="customer-reviews.html" class="sidebar-link">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                        </svg>
                        <span>My Reviews</span>
                    </a>
                    <a href="customer-profile.html" class="sidebar-link">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <span>Profile</span>
                    </a>
                    <a href="customer-settings.html" class="sidebar-link">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M12 1v6m0 6v6"></path>
                            <path d="M17 7l-5 5"></path>
                            <path d="M7 7l5 5"></path>
                        </svg>
                        <span>Settings</span>
                    </a>
                </nav>
                <div style="margin-top: auto; padding: 0.75rem;">
                    <button onclick="auth.logout()" class="btn btn-outline btn-full" style="color: #ef4444; border-color: #ef4444;">Logout</button>
                </div>
            </aside>

            <main class="dashboard-content" id="dashboardContent"></main>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/data.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/portal-header.js"></script>
    <script>
        auth.requireRole('customer');
        const user = auth.getUser();

        // Render header using the shared component
        document.getElementById('portalHeader').innerHTML = renderPortalHeader('Customer Portal', true);

        // Render dashboard content (same as before)
        const totalSpent = orders.reduce((sum, order) => sum + order.price, 0);
        const totalOrders = orders.length;
        const pendingOrders = orders.filter(o => o.status === "Pending").length;
        const deliveredOrders = orders.filter(o => o.status === "Delivered").length;

        document.getElementById('dashboardContent').innerHTML = `
            <div>
                <h1 style="font-size: 1.875rem; font-weight: 700; margin-bottom: 0.5rem;">Welcome back, ${user.name.split(' ')[0]}!</h1>
                <p style="color: var(--text-muted);">Here's what's happening with your account today.</p>
            </div>

            <div class="stats-grid" style="margin-top: 1.5rem;">
                <div class="stat-card">
                    <div style="display: flex; align-items: center; justify-between; margin-bottom: 1rem;">
                        <div style="padding: 0.75rem; background: rgba(59, 130, 246, 0.1); border-radius: 0.5rem;">
                            📦
                        </div>
                        <span style="font-size: 0.75rem; color: var(--success); font-weight: 500;">+12%</span>
                    </div>
                    <div class="stat-value">${totalOrders}</div>
                    <div class="stat-label">Total Orders</div>
                </div>

                <div class="stat-card">
                    <div style="display: flex; align-items: center; justify-between; margin-bottom: 1rem;">
                        <div style="padding: 0.75rem; background: rgba(16, 185, 129, 0.1); border-radius: 0.5rem;">
                            💰
                        </div>
                        <span style="font-size: 0.75rem; color: var(--success); font-weight: 500;">+8%</span>
                    </div>
                    <div class="stat-value">$${totalSpent.toFixed(2)}</div>
                    <div class="stat-label">Total Spent</div>
                </div>

                <div class="stat-card">
                    <div style="display: flex; align-items: center; justify-between; margin-bottom: 1rem;">
                        <div style="padding: 0.75rem; background: rgba(249, 115, 22, 0.1); border-radius: 0.5rem;">
                            ⏰
                        </div>
                        <span style="font-size: 0.75rem; color: var(--warning); font-weight: 500;">${pendingOrders} pending</span>
                    </div>
                    <div class="stat-value">${pendingOrders}</div>
                    <div class="stat-label">Pending Orders</div>
                </div>

                <div class="stat-card">
                    <div style="display: flex; align-items: center; justify-between; margin-bottom: 1rem;">
                        <div style="padding: 0.75rem; background: rgba(168, 85, 247, 0.1); border-radius: 0.5rem;">
                            📈
                        </div>
                        <span style="font-size: 0.75rem; color: var(--success); font-weight: 500;">+${deliveredOrders}</span>
                    </div>
                    <div class="stat-value">${deliveredOrders}</div>
                    <div class="stat-label">Delivered</div>
                </div>
            </div>

            <div style="background: var(--card); border: 1px solid var(--border); border-radius: 1rem; overflow: hidden; margin-top: 1.5rem;">
                <div style="padding: 1.25rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
                    <h2 style="font-size: 1.25rem; font-weight: 700;">Recent Orders</h2>
                    <a href="customer-orders.html" style="font-size: 0.875rem; color: var(--accent); text-decoration: none;">View All</a>
                </div>
                <div style="overflow-x: auto;">
                    <table style="width: 100%; font-size: 0.875rem;">
                        <thead style="background: rgba(243, 244, 246, 0.5);">
                            <tr>
                                <th style="text-align: left; padding: 1rem; font-weight: 500;">Order ID</th>
                                <th style="text-align: left; padding: 1rem; font-weight: 500;">Product</th>
                                <th style="text-align: left; padding: 1rem; font-weight: 500;">Date</th>
                                <th style="text-align: left; padding: 1rem; font-weight: 500;">Status</th>
                                <th style="text-align: left; padding: 1rem; font-weight: 500;">Price</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${orders.slice(0, 3).map(o => `
                                <tr style="border-top: 1px solid var(--border);">
                                    <td style="padding: 1rem; font-weight: 500;">${o.id}</td>
                                    <td style="padding: 1rem;">${o.product}</td>
                                    <td style="padding: 1rem; color: var(--text-muted);">${formatDate(o.date)}</td>
                                    <td style="padding: 1rem;"><span class="badge-${o.status.toLowerCase()}">${o.status}</span></td>
                                    <td style="padding: 1rem; font-weight: 600;">$${o.price}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            </div>
        `;
    </script>
</body>
</html>
