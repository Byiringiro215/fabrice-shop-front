<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product - Seller Panel</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div id="portalHeader"></div>
    
    <div class="dashboard">
        <aside class="sidebar">
            <h2 style="padding: 1.5rem; font-size: 1.25rem; font-weight: 700; color: white; border-bottom: 1px solid rgba(255, 255, 255, 0.1);">Seller Panel</h2>
            <nav>
                <a href="seller-dashboard.html" class="sidebar-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    <span>Dashboard</span>
                </a>
                <a href="seller-products.html" class="sidebar-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                        <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                        <line x1="12" y1="22.08" x2="12" y2="12"></line>
                    </svg>
                    <span>My Products</span>
                </a>
                <a href="seller-add-product.html" class="sidebar-link active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    <span>Add Product</span>
                </a>
                <a href="seller-profile.html" class="sidebar-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    <span>Profile</span>
                </a>
                <a href="seller-settings.html" class="sidebar-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M12 1v6m0 6v6"></path>
                        <path d="M17 7l-5 5"></path>
                        <path d="M7 7l5 5"></path>
                    </svg>
                    <span>Settings</span>
                </a>
            </nav>
            <div style="margin-top: auto; padding: 0.75rem;">
                <button onclick="auth.logout()" class="btn btn-outline btn-full" style="color: #ef4444; border-color: #ef4444;">Logout</button>
            </div>
        </aside>

        <main class="dashboard-content">
            <h1 style="font-size: 2rem; font-weight: 700; margin-bottom: 2rem;">Add New Product</h1>

            <div style="background: var(--card); border: 1px solid var(--border); border-radius: 1rem; padding: 2rem; max-width: 800px;">
                <form id="productForm">
                    <div class="form-group">
                        <label class="form-label">Product Name</label>
                        <input type="text" class="form-input" id="productName" required>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label class="form-label">Category</label>
                            <select class="form-select" id="category" required>
                                <option value="">Select Category</option>
                                <option value="Electronics">Electronics</option>
                                <option value="Fashion">Fashion</option>
                                <option value="Sports">Sports</option>
                                <option value="Food & Beverage">Food & Beverage</option>
                                <option value="Home & Garden">Home & Garden</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Price ($)</label>
                            <input type="number" class="form-input" id="price" step="0.01" min="0" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Description</label>
                        <textarea class="form-textarea" id="description" rows="4" required></textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Product Images</label>
                        <input type="file" class="form-input" id="images" multiple accept="image/*">
                        <p style="font-size: 0.875rem; color: var(--text-muted); margin-top: 0.5rem;">Upload up to 5 images</p>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Location</label>
                        <select class="form-select" id="location" required>
                            <option value="">Select Location</option>
                            <option value="Kigali">Kigali</option>
                            <option value="Butare">Butare</option>
                            <option value="Musanze">Musanze</option>
                            <option value="Gisenyi">Gisenyi</option>
                        </select>
                    </div>

                    <div style="display: flex; gap: 1rem;">
                        <button type="submit" class="btn btn-primary">Add Product</button>
                        <button type="reset" class="btn btn-outline">Reset</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/portal-header.js"></script>
    <script src="../js/main.js"></script>
    <script>
        auth.requireRole('seller');

        // Initialize portal header
        document.getElementById('portalHeader').innerHTML = renderPortalHeader('Seller Panel', false);

        document.getElementById('productForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const price = parseFloat(document.getElementById('price').value);
            if (price <= 0) {
                showToast('Price must be greater than 0', 'error');
                return;
            }

            showToast('Product added successfully!', 'success');
            setTimeout(() => {
                window.location.href = 'seller-products.html';
            }, 1500);
        });
    </script>
</body>
</html>
